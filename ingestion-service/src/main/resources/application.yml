spring:
    application:
        name: ${SPRING_APPLICATION_NAME}
    cloud:
        consul:
            host: ${SPRING_CLOUD_CONSUL_HOST}
            port: ${SPRING_CLOUD_CONSUL_PORT}
            discovery:
                enabled: true
                prefer-ip-address: true
                ip-address: ${SERVER_HOST}
                port: ${SERVER_PORT}
                service-name: eco-monitoring-ingestion
                health-check-path: /actuator/health
                health-check-interval: 10s

vector:
    sidecar:
        host: ${VECTOR_SIDECAR_HOST}
        port: ${VECTOR_SIDECAR_PORT}

server:
    port: ${SERVER_PORT}

management:
    health:
        defaults:
            enabled: true
    endpoint:
        health:
            show-details: "always"
            show-components: "always"
            probes:
                enabled: true
    endpoints:
        web:
            exposure:
                include: "health,info,prometheus"
