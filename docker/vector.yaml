api:
  enabled: true
  address: "127.0.0.1:8686"

sources:
  grpc_sensor_in:
    type: "vector"
    address: "0.0.0.0:6000"

transforms:
  extract_pure_bytes:
    type: "remap"
    inputs: [ "grpc_sensor_in" ]
    source: |
      .message = .raw_protobuf_packet

sinks:
  kafka_out:
    type: "kafka"
    inputs: [ "extract_pure_bytes" ]
    bootstrap_servers: "kafka:9092"
    topic: "environment.weather.telemetry.live"
    encoding:
      codec: "raw_message"
    compression: "lz4"
    librdkafka_options:
      "queue.buffering.max.messages": "100000"
      "acks": "all"
    sasl:
      enabled: true
      mechanism: "SCRAM-SHA-512"
      username: ${KAFKA_USER}
      password: ${KAFKA_PASSWORD}

    buffer:
      type: "disk"
      max_size: 5368709120
      when_full: "block"